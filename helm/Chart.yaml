apiVersion: v2
name: model-prism
description: >-
  Open Model Prism — multi-tenant, OpenAI-API-compatible LLM gateway.
  Connects any provider (OpenAI, Anthropic, Bedrock, Azure, Ollama, vLLM,
  OpenRouter) through a single endpoint. Intelligent auto-routing classifies
  prompts and selects the optimal model by task type and cost, with real-time
  cost tracking, per-tenant API keys, rate limits, budgets, and a full admin UI.
  Deploy as a single standalone pod or scale horizontally with separate
  control-plane and autoscaling worker pods.
type: application
version: 0.0.1
appVersion: "0.0.1"
kubeVersion: ">=1.25.0-0"
home: https://github.com/weisser-dev/open-model-prism
icon: https://raw.githubusercontent.com/weisser-dev/open-model-prism/main/docs/logo.svg
sources:
