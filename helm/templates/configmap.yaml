apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "model-prism.fullname" . }}
  labels:
    {{- include "model-prism.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  PORT: "3000"
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
  OFFLINE: {{ .Values.config.offline | quote }}
