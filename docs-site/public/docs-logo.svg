<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-label="ohara Docs">
  <defs>
    <linearGradient id="docs-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#38bdf8"/>
      <stop offset="50%"  stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <filter id="docs-glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Book spine (left edge) -->
  <path d="M14 6 C10 6, 8 8, 8 10 L8 38 C8 40, 10 42, 14 42"
    fill="none" stroke="url(#docs-grad)" stroke-width="1.5" opacity="0.5"/>

  <!-- Back cover -->
  <path d="M14 6 L38 6 C39.5 6, 40 7, 40 8 L40 36 C40 37, 39.5 38, 38 38 L14 38"
    fill="none" stroke="url(#docs-grad)" stroke-width="1.5" opacity="0.4"/>

  <!-- Front cover (slightly offset) -->
  <path d="M14 8 L38 8 C39.5 8, 40 9, 40 10 L40 38 C40 39, 39.5 40, 38 40 L14 40 C11 40, 10 39, 10 38 L10 10 C10 9, 11 8, 14 8 Z"
    fill="rgba(56,189,248,0.03)" stroke="url(#docs-grad)" stroke-width="1.5" opacity="0.65"/>

  <!-- Spine binding line -->
  <line x1="14" y1="8" x2="14" y2="40"
    stroke="url(#docs-grad)" stroke-width="1" opacity="0.3"/>

  <!-- Text lines on page -->
  <g stroke="url(#docs-grad)" stroke-width="1" stroke-linecap="round" opacity="0.3">
    <line x1="18" y1="15" x2="35" y2="15"/>
    <line x1="18" y1="19" x2="32" y2="19"/>
    <line x1="18" y1="23" x2="34" y2="23"/>
    <line x1="18" y1="27" x2="28" y2="27"/>
    <line x1="18" y1="31" x2="33" y2="31"/>
    <line x1="18" y1="35" x2="25" y2="35"/>
  </g>

  <!-- Bookmark ribbon -->
  <path d="M32 8 L32 18 L35 15 L38 18 L38 8"
    fill="url(#docs-grad)" opacity="0.2"/>

  <!-- Glowing center node -->
  <circle cx="26" cy="24" r="4" fill="#818cf8" opacity="0.10"/>
  <circle cx="26" cy="24" r="2.5" fill="#818cf8" opacity="0.8" filter="url(#docs-glow)"/>
  <circle cx="26" cy="24" r="1.1" fill="white" opacity="0.95"/>
</svg>
