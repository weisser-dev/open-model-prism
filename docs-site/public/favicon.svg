<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="fav-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#38bdf8"/>
      <stop offset="50%"  stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <filter id="fav-glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fav-glow-sm" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#0a0a0f"/>

  <!-- Outer orbital ring -->
  <circle cx="16" cy="16" r="11" stroke="url(#fav-grad)" stroke-width="1.2" opacity="0.6"/>

  <!-- Inner ring -->
  <circle cx="16" cy="16" r="5.5" stroke="url(#fav-grad)" stroke-width="0.7" opacity="0.2"/>

  <!-- Spokes -->
  <g stroke="url(#fav-grad)" stroke-width="0.7" stroke-linecap="round" opacity="0.3">
    <line x1="16" y1="16" x2="16" y2="5"/>
    <line x1="16" y1="16" x2="27" y2="16"/>
    <line x1="16" y1="16" x2="16" y2="27"/>
    <line x1="16" y1="16" x2="5"  y2="16"/>
  </g>

  <!-- 4 orbital nodes -->
  <circle cx="16" cy="5"  r="1.4" fill="#38bdf8" opacity="0.9" filter="url(#fav-glow-sm)"/>
  <circle cx="27" cy="16" r="1.4" fill="#818cf8" opacity="0.9" filter="url(#fav-glow-sm)"/>
  <circle cx="16" cy="27" r="1.4" fill="#e879f9" opacity="0.9" filter="url(#fav-glow-sm)"/>
  <circle cx="5"  cy="16" r="1.4" fill="#818cf8" opacity="0.8" filter="url(#fav-glow-sm)"/>

  <!-- Central hub -->
  <circle cx="16" cy="16" r="4"   fill="#818cf8" opacity="0.10"/>
  <circle cx="16" cy="16" r="2.4" fill="#818cf8" opacity="0.85" filter="url(#fav-glow)"/>
  <circle cx="16" cy="16" r="1.1" fill="white"   opacity="0.97"/>
</svg>
