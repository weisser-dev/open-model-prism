name: Deploy Live Demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'frontend/public/**'
      - 'frontend/package*.json'
      - 'frontend/vite.config.js'
      - 'frontend/index.html'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Build demo
        run: cd frontend && npm run build:demo
        env:
          VITE_DEMO_MODE: 'true'
          VITE_BASE: '/open-model-prism/'
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist-demo

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
